<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>RPM Analyzer — Advanced FFT</title>

        content="width=device-width, initial-scale=1.0,

  <style>
    /* =============================
   全体レイアウト
============================= */
body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
  color: #333;
  overflow-x: hidden;
}

.main-container {
  padding: 12px 16px 16px 16px;
  max-width: 480px;
  margin: 0 auto;
}

/* =============================
   カード
============================= */
.card {
  background: #f5f7fc;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.card-title {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 10px;
}

/* =============================
   FFT Canvas
============================= */
#waveCanvas {
  width: 75%;
  height: 160px;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.08);
  margin: 0 auto;
  display: block;
}

/* =============================
   RPM / SPEED グリッド
============================= */
.rpm-grid, .speed-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 12px;
  margin-left: 32px;
}
.rpm-grid div, .speed-grid div {
  display: flex;
  flex-direction: column;
  font-size: 0.9rem;
}
.rpm-grid span:last-child,
.speed-grid span:last-child {
  font-weight: 700;
  margin-top: 2px;
  text-align: right;
  font-size: 1.2rem;
}

/* =============================
   RPM 表示範囲
============================= */
.rpm-limit-box {
  margin: 12px 0 16px 0;
  padding: 12px;
  background: #ffffff;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.rpm-limit-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.limit-slider {
  flex: 1;
  margin: 0 10px;
  accent-color: #4fa3ff;
}
.limit-value {
  width: 60px;
  text-align: right;
  font-size: 0.9rem;
}

/* =============================
   ステータスライン
============================= */
.status-line {
  margin-top: 12px;
  font-size: 0.9rem;
  color: #666;
}

/* =============================
   ボタン
============================= */
.realtime-buttons-2row {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.btn-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.primary-btn, .secondary-btn {
  padding: 14px 0;
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 700;
  border: none;
}
.primary-btn {
  background: #ff4fa3;
  color: #fff;
}
.secondary-btn {
  background: #e6ecff;
  color: #4a6cff;
}

/* =============================
   スライダー
============================= */
input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 999px;
  background: #e3e7f5;
  outline: none;
  margin-top: 10px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 42px;
  height: 27px;
  background: #ffffff;
  border-radius: 999px;
  border: 2px solid #4a6cff;
}

/* =============================
   比較表
============================= */
.comparison-wrapper {
  overflow-x: auto;
  padding-bottom: 12px;
  margin-top: 10px;
}
.comparison-table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  min-width: 760px;
  background: #ffffff;
  border-radius: 14px;

.comparison-table thead th {

  z-index: 3;

}
.comparison-table td:first-child,

  background: #ffffff;

}
.comparison-table td {

  <script>
    /* =============================
   JS1 — FFT / Audio / Peak / RPM
============================= */

/* ---- 定数 ---- */
const SAMPLE_RATE = 48000;
const FFT_SIZE = 16384;
const HARMONIC_MAX = 6;

/* ---- 状態 ---- */
let audioContext = null;
let analyser = null;
let micStream = null;
let fftBuffer = new Float32Array(FFT_SIZE);

let running = false;
let locked = false;

/* ---- UI 参照（PART 1/2 の HTML と連結） ---- */
const UI = {
  waveCanvas: document.getElementById("waveCanvas"),

  rpmNow: document.getElementById("rpmNow"),
  rpmMax: document.getElementById("rpmMax"),
  rpmMin: document.getElementById("rpmMin"),

  speedNow: document.getElementById("speedNow"),
  speedTop: document.getElementById("speedTop"),
  speedMin: document.getElementById("speedMin"),

  rpmMinLimit: document.getElementById("rpmMinLimit"),
  rpmMaxLimit: document.getElementById("rpmMaxLimit"),
  rpmMinLimitValue: document.getElementById("rpmMinLimitValue"),
  rpmMaxLimitValue: document.getElementById("rpmMaxLimitValue"),

  startBtn: document.getElementById("startBtn"),
  lockBtn: document.getElementById("lockBtn"),
  saveBtn: document.getElementById("saveBtn"),
  resetBtn: document.getElementById("resetBtn"),
  historyBtn2: document.getElementById("historyBtn2"),
  settingsBtn2: document.getElementById("settingsBtn2"),

  statusLine: document.getElementById("statusLine"),

  voltageRange: document.getElementById("voltageRange"),
  voltageLabel: document.getElementById("voltageLabel"),
  gearRange: document.getElementById("gearRange"),
  gearLabel: document.getElementById("gearLabel"),
  tireRange: document.getElementById("tireRange"),
  tireLabel: document.getElementById("tireLabel"),

  comparisonBody: document.getElementById("comparisonBody"),

  historyModal: document.getElementById("historyModalBackdrop"),
  filterVoltage: document.getElementById("filterVoltage"),
  filterGear: document.getElementById("filterGear"),
  filterTire: document.getElementById("filterTire"),
  filterMotor: document.getElementById("filterMotor"),
  filterName: document.getElementById("filterName"),
  historySearchBtn: document.getElementById("historySearchBtn"),
  historyList: document.getElementById("historyList"),
  closeHistory: document.getElementById("closeHistory"),

  saveModal: document.getElementById("saveModalBackdrop"),
  saveNameInput: document.getElementById("saveNameInput"),
  motorTypeSelect: document.getElementById("motorTypeSelect"),
  saveConfirmBtn: document.getElementById("saveConfirmBtn"),
  saveCancelBtn: document.getElementById("saveCancelBtn"),

  settingsModal: document.getElementById("settingsModalBackdrop"),
  helpButton: document.getElementById("helpButton"),
  helpText: document.getElementById("helpText"),
  noiseRange: document.getElementById("noiseRange"),
  noiseLabel: document.getElementById("noiseLabel"),
  rpmCalRange: document.getElementById("rpmCalRange"),
  rpmCalLabel: document.getElementById("rpmCalLabel"),
  loadFactorRange: document.getElementById("loadFactorRange"),
  loadFactorLabel: document.getElementById("loadFactorLabel"),
  settingsResetBtn: document.getElementById("settingsResetBtn"),
  closeSettings: document.getElementById("closeSettings"),
};

/* ---- Audio 初期化 ---- */
async function initAudio() {
  if (audioContext) return;

  audioContext = new (window.AudioContext || window.webkitAudioContext)({
    sampleRate: SAMPLE_RATE
  });

  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioContext.createMediaStreamSource(micStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.0;

  source.connect(analyser);
}

/* ---- FFT 描画 ---- */
function drawFFT() {
  analyser.getFloatFrequencyData(fftBuffer);

  const width = UI.waveCanvas.width;
  const height = UI.waveCanvas.height;
  const ctx = UI.waveCanvas.getContext("2d");

  ctx.clearRect(0, 0, width, height);
  ctx.beginPath();
  ctx.strokeStyle = "#4a6cff";
  ctx.lineWidth = 1;

  const nyquist = SAMPLE_RATE / 2;

  const minRpm = parseInt(UI.rpmMinLimit.value, 10);
  const maxRpm = parseInt(UI.rpmMaxLimit.value, 10);

  const minHz = minRpm / 60;
  const maxHz = maxRpm / 60;

  const minIndex = Math.floor(minHz / nyquist * fftBuffer.length);
  const maxIndex = Math.floor(maxHz / nyquist * fftBuffer.length);

  for (let i = minIndex; i <= maxIndex; i++) {
    const x = (i - minIndex) / (maxIndex - minIndex) * width;
    const db = fftBuffer[i];
    const norm = (db + 120) / 120;
    const y = height - norm * height;

    if (i === minIndex) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();
}

function detectPeak2000Hz_StrongRange() {
  const nyquist = SAMPLE_RATE / 2;

  const maxHz = 2000;  // ★ 高周波ノイズを拾わない
  const maxIndex = Math.floor(maxHz / nyquist * fftBuffer.length);

  analyser.getFloatFrequencyData(fftBuffer);

  // ★ 平均（dB）
  let sum = 0;
  for (let i = 0; i <= maxIndex; i++) sum += fftBuffer[i];
  const avg = sum / maxIndex;

  // ★ マイクに近い音だけ拾うフィルタ
  const minThreshold = avg + 5;    // ★ 少し強い音
  const maxThreshold = avg + 20;   // ★ 強すぎるノイズは除外

  let bestIndex = -1;
  let bestValue = -Infinity;

  for (let i = 1; i < maxIndex - 1; i++) {
    const v = fftBuffer[i];

    if (v < minThreshold) continue;  // ★ 弱い音は無視
    if (v > maxThreshold) continue;  // ★ 強すぎる音も無視

    const left = fftBuffer[i - 1];
    const right = fftBuffer[i + 1];

    // ★ 周囲差フィルタ（1.5dBで十分）
    if (v - Math.max(left, right) < 1.5) continue;

    if (v > bestValue) {
      bestValue = v;
      bestIndex = i;
    }
  }

  if (bestIndex < 0) return null;

  return bestIndex * nyquist / fftBuffer.length;
}


/* ---- RPM計算 ---- */
function computeRpm(peakHz) {
  if (!peakHz) return 0;

  let rpm = peakHz * 60;

  const cal = parseFloat(UI.rpmCalRange.value);
  rpm *= cal;

  const loadFactor = parseFloat(UI.loadFactorRange.value);
  rpm *= (1 - loadFactor / 100);

  return rpm;
}
/* =============================
   JS2 — Speed / Comparison / Sliders / State
============================= */

/* ---- ギヤ比テーブル ---- */
const gearRatios = [3.5, 3.7, 4.0, 4.2, 5.0, 6.4, 8.75, 11.2];

function gearLabelFromIndex(idx) {
  const labels = ["3.5:1","3.7:1","4.0:1","4.2:1","5.0:1","6.4:1","8.75:1","11.2:1"];
  return labels[idx] || "4.0:1";
}

/* ---- 状態管理 ---- */
const state = {
  rpmNow: 0,
  rpmMax: 0,
  rpmMin: Infinity,

  speedNow: 0,
  speedTop: 0,
  speedMin: Infinity,

  voltage: 3.0,
  gearIndex: 2,
  tireMm: 26.0,

  history: []
};

/* ---- 速度計算 ---- */
function computeSpeed(rpm, gearRatio, tireMm) {
  const wheelRpm = rpm / gearRatio;
  const tireM = tireMm / 1000;
  const speedMps = wheelRpm * tireM * Math.PI / 60;
  return speedMps * 3.6;
}

/* ---- リアルタイム UI 更新 ---- */
function updateRealtimeUI(rpm) {
  if (!rpm || !isFinite(rpm)) return;

  state.rpmNow = rpm;
  state.rpmMax = Math.max(state.rpmMax, rpm);
  state.rpmMin = Math.min(state.rpmMin, rpm);

  const gearRatio = gearRatios[state.gearIndex] || 4.0;

  const speedNow = computeSpeed(rpm, gearRatio, state.tireMm);
  const speedTop = computeSpeed(state.rpmMax, gearRatio, state.tireMm);
  const speedMin = computeSpeed(state.rpmMin, gearRatio, state.tireMm);

  state.speedNow = speedNow;
  state.speedTop = speedTop;
  state.speedMin = speedMin;

  UI.rpmNow.textContent = Math.round(state.rpmNow);
  UI.rpmMax.textContent = Math.round(state.rpmMax);
  UI.rpmMin.textContent = Math.round(state.rpmMin);

  UI.speedNow.textContent = speedNow.toFixed(2) + " km/h";
  UI.speedTop.textContent = speedTop.toFixed(2) + " km/h";
  UI.speedMin.textContent = speedMin.toFixed(2) + " km/h";
}

/* ---- 比較表生成 ---- */
function buildComparisonTable() {
  UI.comparisonBody.innerHTML = "";

  const voltages = [2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4];

  voltages.forEach(v => {
    const baseRpm = state.rpmNow || 30000;
    const scale = v / state.voltage;
    const rpm = baseRpm * scale;

    const tr = document.createElement("tr");

    const tdV = document.createElement("td");
    tdV.textContent = v.toFixed(1) + " V";
    tr.appendChild(tdV);

    const tdR = document.createElement("td");
    tdR.textContent = Math.round(rpm);
    tr.appendChild(tdR);

    gearRatios.forEach(gr => {
      const td = document.createElement("td");
      const sp = computeSpeed(rpm, gr, state.tireMm);
      td.textContent = sp.toFixed(2);
      tr.appendChild(td);
    });

    UI.comparisonBody.appendChild(tr);
  });
}

   JS3 — History / Save / Settings
============================= */

/* ---- 履歴描画 ---- */
function renderHistory() {
  UI.historyList.innerHTML = "";

  state.history.forEach(h => {
    const row = document.createElement("div");
    row.className = "history-row";
    row.innerHTML = `
      <span>${h.date}</span>
      <span>${h.name}</span>
      <span>${h.motor}</span>
      <span>${h.speed}</span>
      <span>${h.rpm}</span>
      <span>${h.voltage}</span>
      <span>${h.gear}</span>
      <span>${h.tire}</span>
    `;
    UI.historyList.appendChild(row);
  });
}

/* ---- 履歴モーダル ---- */
UI.historyBtn2.addEventListener("click", () => {
  UI.historyModal.classList.remove("hidden");
});
UI.closeHistory.addEventListener("click", () => {
  UI.historyModal.classList.add("hidden");
});

/* ---- 保存モーダル ---- */
UI.saveBtn.addEventListener("click", () => {
  UI.saveModal.classList.remove("hidden");
});

UI.saveCancelBtn.addEventListener("click", () => {
  UI.saveModal.classList.add("hidden");
});

UI.saveConfirmBtn.addEventListener("click", () => {
  const name = UI.saveNameInput.value.trim();
  const motor = UI.motorTypeSelect.value;

  if (!name || !motor) return;

  const entry = {
    date: new Date().toLocaleString(),
    name,
    motor,
    speed: state.speedNow.toFixed(2),
    rpm: Math.round(state.rpmNow),
    voltage: state.voltage.toFixed(1),
    gear: gearLabelFromIndex(state.gearIndex),
    tire: state.tireMm.toFixed(1)
  };

  state.history.push(entry);
  renderHistory();
  UI.saveModal.classList.add("hidden");
});

/* =============================
   JS4 — Main Loop / Start / Lock / Reset
============================= */

/* ---- メインループ ---- */
function loop() {
  if (!running || locked) {
    requestAnimationFrame(loop);
    return;
  }

  drawFFT();                     // JS1
  const peakHz = detectPeak2000Hz_StrongRange();// JS1
  const rpm = computeRpm(peakHz); // JS1
  updateRealtimeUI(rpm);         // JS2
  buildComparisonTable();        // JS2

  requestAnimationFrame(loop);
}

/* ---- 計測開始 ---- */
UI.startBtn.addEventListener("click", async () => {
  if (!audioContext) {
    await initAudio();           // JS1
  }

  running = true;
  locked = false;

  UI.statusLine.textContent = "MEASURING — 計測中";

  loop();                        // JS4 main loop
});

/* ---- ロック ---- */
UI.lockBtn.addEventListener("click", () => {
  locked = !locked;
  UI.lockBtn.textContent = locked ? "ロック解除" : "ロック";
  UI.statusLine.textContent = locked
    ? "LOCKED — 値固定中"
    : "MEASURING — 計測中";
});

/* ---- リセット ---- */
UI.resetBtn.addEventListener("click", () => {
  state.rpmNow = 0;
  state.rpmMax = 0;
  state.rpmMin = Infinity;

  state.speedNow = 0;
  state.speedTop = 0;
  state.speedMin = Infinity;

  UI.rpmNow.textContent = "--";
  UI.rpmMax.textContent = "--";
  UI.rpmMin.textContent = "--";

  UI.speedNow.textContent = "-- km/h";
  UI.speedTop.textContent = "-- km/h";
  UI.speedMin.textContent = "-- km/h";

  UI.statusLine.textContent = "READY — 計測待機中";
});

/* ---- 初期表示 ---- */
UI.voltageLabel.textContent = state.voltage.toFixed(1) + " V";
UI.gearLabel.textContent = gearLabelFromIndex(state.gearIndex);
UI.tireLabel.textContent = state.tireMm.toFixed(1) + " mm";

UI.rpmMinLimitValue.textContent = UI.rpmMinLimit.value;
UI.rpmMaxLimitValue.textContent = UI.rpmMaxLimit.value;
