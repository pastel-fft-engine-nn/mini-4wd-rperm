<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor Tachometer Pro</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; }
        body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .box { background: var(--card); padding: 12px; border-radius: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .label { font-size: 0.65rem; color: #8e8e93; margin-bottom: 2px; }
        .value { font-size: 1rem; font-weight: 700; }
        .slider-box, .select-box, .input-box { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .controls { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        #startBtn { background: var(--accent); color: white; }
        #stopBtn { background: #ff3b30; color: white; }
        #saveBtn { background: #34c759; color: white; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-top: 5px; }
        #canvas { width: 100%; height: 150px; background: #000; border-radius: 16px; margin-bottom: 5px; }
        .log-item { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvas"></canvas>
    
    <div class="grid">
        <div class="box"><div class="label">RPM</div><div id="rpmCur" class="value">0</div></div>
        <div class="box"><div class="label">MAX</div><div id="rpmMax" class="value">0</div></div>
        <div class="box"><div class="label">MIN</div><div id="rpmMin" class="value">0</div></div>
    </div>

    <div class="grid">
        <div class="box"><div class="label">SPEED</div><div id="spdCur" class="value">0.0</div></div>
        <div class="box"><div class="label">MAX</div><div id="spdMax" class="value">0.0</div></div>
        <div class="box"><div class="label">MIN</div><div id="spdMin" class="value">0.0</div></div>
    </div>

    <div class="controls">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>停止</button>
        <button id="saveBtn">保存</button>
    </div>

    <div class="input-box">
        <input type="text" id="nameInput" placeholder="名前 (必須)">
        <select id="motorSelect">
            <option value="">モーター種類を選択</option>
            <option value="ノーマル">ノーマル</option><option value="レブチューン">レブチューン</option>
            <option value="トルクチューン">トルクチューン</option><option value="アトミックチューン">アトミックチューン</option>
            <option value="ライトダッシュ">ライトダッシュ</option><option value="ハイパーダッシュ">ハイパーダッシュ</option>
            <option value="パワーダッシュ">パワーダッシュ</option><option value="スプリントダッシュ">スプリントダッシュ</option>
            <option value="ウルトラダッシュ">ウルトラダッシュ</option><option value="プラズマダッシュ">プラズマダッシュ</option>
            <option value="レブチューンPRO">レブチューンPRO</option><option value="トルクチューンPRO">トルクチューンPRO</option>
            <option value="アトミックチューンPRO">アトミックチューンPRO</option><option value="ライトダッシュPRO">ライトダッシュPRO</option>
            <option value="ハイバーダッシュPRO">ハイパーダッシュPRO</option><option value="マッハダッシュPRO">マッハダッシュPRO</option>
        </select>
    </div>

    <div class="select-box">
        <div class="label">フィルター</div>
        <input type="text" id="filterName" placeholder="名前で絞り込み">
        <select id="filterMotor"><option value="">全モーター</option></select>
    </div>

    <div id="logList"></div>
</div>

<script>
    let audioCtx, analyser, dataArray, animationId, lastRpm = 0;
    let logs = [];

    // モーターオプションをフィルター用にもコピー
    const motorSelect = document.getElementById('motorSelect');
    const filterMotor = document.getElementById('filterMotor');
    filterMotor.innerHTML = motorSelect.innerHTML;

    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('nameInput').value;
        if (!name) { alert("名前を入力してください"); return; }
        
        const log = {
            name,
            motor: motorSelect.value || "未選択",
            gear: document.getElementById('gearSelect').value,
            tire: document.getElementById('tireSlider').value,
            maxRpm: stats.maxRpm,
            maxSpd: stats.maxSpd
        };
        logs.push(log);
        renderLogs();
    };

    function renderLogs() {
        const list = document.getElementById('logList');
        list.innerHTML = "";
        const fName = document.getElementById('filterName').value;
        const fMotor = filterMotor.value;

        logs.filter(l => l.name.includes(fName) && (fMotor === "" || l.motor === fMotor)).forEach(l => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<strong>${l.name}</strong> (${l.motor})<br>ギヤ:${l.gear} タイヤ:${l.tire}mm<br>MAX: ${l.maxRpm}RPM / ${l.maxSpd.toFixed(1)}km/h`;
            list.appendChild(div);
        });
    }

    // 他の計算処理は前回同様
    // ... (計測ロジックは前回コードを維持)
</script>
</body>
</html>
