<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mini4WD Motor RPM Monitor</title>
    <style>
        body { background: #1a1a1a; color: #ff0000; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: auto; }
        .box { border: 2px solid #ff0000; padding: 15px; border-radius: 8px; }
        .label { font-size: 0.7rem; color: #fff; }
        .value { font-size: 1.8rem; font-weight: bold; }
        button { background: #ff0000; color: #fff; border: none; padding: 20px; font-size: 1.2rem; cursor: pointer; width: 100%; max-width: 400px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>MOTOR RPM MONITOR</h1>
    <button id="startBtn">測定開始</button>

    <div class="container">
        <div class="box"><div class="label">リアルタイム (Hz)</div><div id="current" class="value">0</div></div>
        <div class="box"><div class="label">換算回転数 (RPM)</div><div id="rpm" class="value">0</div></div>
        <div class="box"><div class="label">平均 (Hz)</div><div id="avg" class="value">0</div></div>
        <div class="box"><div class="label">最高 (Hz)</div><div id="max" class="value">0</div></div>
    </div>

    <script>
        let audioCtx, analyser, dataArray;
        let maxFreq = 0, sumFreq = 0, count = 0;

        document.getElementById('startBtn').onclick = async () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            
            analyser = audioCtx.createAnalyser();
            // 周波数分解能を高めるためfftSizeを大きく設定
            analyser.fftSize = 4096; 
            source.connect(analyser);
            
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            document.getElementById('startBtn').innerText = "測定中...";
            update();
        };

        function update() {
            analyser.getByteFrequencyData(dataArray);
            
            let maxVal = 0, maxIndex = 0;
            // 100Hz〜3000Hzの範囲を重点的に探索
            const minBin = Math.floor(100 * analyser.fftSize / audioCtx.sampleRate);
            const maxBin = Math.floor(3000 * analyser.fftSize / audioCtx.sampleRate);
            
            for (let i = minBin; i < maxBin; i++) {
                if (dataArray[i] > maxVal) { 
                    maxVal = dataArray[i]; 
                    maxIndex = i; 
                }
            }
            
            const currentHz = Math.round(maxIndex * audioCtx.sampleRate / analyser.fftSize);
            
            if (currentHz >= 100) {
                document.getElementById('current').innerText = currentHz;
                // RPM換算: 1Hz = 60RPM
                document.getElementById('rpm').innerText = currentHz * 60;
                
                maxFreq = Math.max(maxFreq, currentHz);
                sumFreq += currentHz;
                count++;
                
                document.getElementById('avg').innerText = Math.round(sumFreq / count);
                document.getElementById('max').innerText = maxFreq;
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
