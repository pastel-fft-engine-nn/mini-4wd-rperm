<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor Tachometer Pro</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; }
        body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1c1c1e; padding: 20px; margin: 0; }
        .container { max-width: 100%; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .box { background: var(--card); padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .label { font-size: 0.7rem; color: #8e8e93; margin-bottom: 5px; }
        .value { font-size: 1.2rem; font-weight: 800; }
        .slider-box { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; }
        button { flex: 1; padding: 18px; border-radius: 14px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; }
        #startBtn { background: var(--accent); color: white; }
        #stopBtn { background: #ff3b30; color: white; }
        #resetBtn { background: #e5e5ea; }
        #canvas { width: 100%; height: 180px; background: #000; border-radius: 16px; display: block; touch-action: none; }
        .axis-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #8e8e93; padding: 10px 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="slider-box">
        <div class="label">タイヤ外径: <span id="tireVal">26.0</span>mm</div>
        <input type="range" id="tireSlider" min="22.0" max="35.0" step="0.1" value="26.0" style="width: 100%; height: 30px;">
    </div>
    <div class="controls">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>停止</button>
        <button id="resetBtn">リセット</button>
    </div>

    <div class="grid">
        <div class="box"><div class="label">RPM(現)</div><div id="rpmCur" class="value">0</div></div>
        <div class="box"><div class="label">RPM(高)</div><div id="rpmMax" class="value">0</div></div>
        <div class="box"><div class="label">RPM(低)</div><div id="rpmMin" class="value">0</div></div>
        <div class="box"><div class="label">速度(現)</div><div id="spdCur" class="value">0.0</div></div>
        <div class="box"><div class="label">速度(高)</div><div id="spdMax" class="value">0.0</div></div>
        <div class="box"><div class="label">速度(低)</div><div id="spdMin" class="value">0.0</div></div>
    </div>

    <canvas id="canvas"></canvas>
    <div class="axis-labels">
        <span>0</span><span>200</span><span>500</span><span>1k</span><span>2k</span><span>5k</span><span>10k</span><span>20k</span><span>40k</span><span>50k</span>
    </div>
</div>

<script>
    const CONFIG = { SENSITIVITY: 128, MAX_RPM: 50000 };
    let audioCtx, analyser, dataArray, animationId, lastUpdate = 0;
    const stats = { maxRpm: 0, minRpm: 999999, maxSpd: 0, minSpd: 999999 };

    const el = {
        canvas: document.getElementById('canvas'),
        rpmCur: document.getElementById('rpmCur'), rpmMax: document.getElementById('rpmMax'), rpmMin: document.getElementById('rpmMin'),
        spdCur: document.getElementById('spdCur'), spdMax: document.getElementById('spdMax'), spdMin: document.getElementById('spdMin'),
        tire: document.getElementById('tireSlider'), tireVal: document.getElementById('tireVal'),
        start: document.getElementById('startBtn'), stop: document.getElementById('stopBtn'), reset: document.getElementById('resetBtn')
    };

    const ctx = el.canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
        el.canvas.width = el.canvas.offsetWidth * dpr;
        el.canvas.height = el.canvas.offsetHeight * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    el.tire.oninput = () => el.tireVal.textContent = el.tire.value;
    el.reset.onclick = () => {
        stats.maxRpm = 0; stats.minRpm = 999999; stats.maxSpd = 0; stats.minSpd = 999999;
        [el.rpmCur, el.rpmMax, el.rpmMin].forEach(e => e.textContent = "0");
        [el.spdCur, el.spdMax, el.spdMin].forEach(e => e.textContent = "0.0");
    };

    el.start.onclick = async () => {
        // iPhone向け：AudioContextの作成と再開
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume(); 
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 16384;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            el.start.disabled = true; el.stop.disabled = false;
            update();
        } catch (err) {
            alert("マイクへのアクセスが拒否されました。設定を確認してください。");
        }
    };

    el.stop.onclick = () => { cancelAnimationFrame(animationId); audioCtx.close(); el.start.disabled = false; el.stop.disabled = true; };

    function update(timestamp) {
        animationId = requestAnimationFrame(update);
        if (timestamp - lastUpdate < 50) return;
        lastUpdate = timestamp;

        analyser.getByteFrequencyData(dataArray);
        const [cw, ch] = [el.canvas.width / dpr, el.canvas.height / dpr];
        ctx.clearRect(0, 0, cw, ch);

        let maxVal = 0, maxIndex = 0;
        ctx.beginPath();
        ctx.strokeStyle = '#007aff';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < dataArray.length; i++) {
            if (dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIndex = i; }
            const x = (i / dataArray.length) * cw;
            const y = ch - (Math.min(dataArray[i], CONFIG.SENSITIVITY) / CONFIG.SENSITIVITY) * ch;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        const hz = Math.round(maxIndex * audioCtx.sampleRate / analyser.fftSize);
        if (hz > 50) {
            const rpm = hz * 60;
            const spd = ((el.tire.value * Math.PI * rpm * 60) / 1000000);
            
            if (rpm > stats.maxRpm) stats.maxRpm = rpm;
            if (rpm < stats.minRpm || stats.minRpm === 999999) stats.minRpm = rpm;
            if (spd > stats.maxSpd) stats.maxSpd = spd;
            if (spd < stats.minSpd || stats.minSpd === 999999) stats.minSpd = spd;

            el.rpmCur.textContent = rpm.toLocaleString();
            el.rpmMax.textContent = stats.maxRpm.toLocaleString();
            el.rpmMin.textContent = stats.minRpm.toLocaleString();
            el.spdCur.textContent = spd.toFixed(1);
            el.spdMax.textContent = stats.maxSpd.toFixed(1);
            el.spdMin.textContent = stats.minSpd.toFixed(1);

            const pos = (rpm / CONFIG.MAX_RPM) * cw;
            ctx.strokeStyle = '#ff3b30';
            ctx.lineWidth = 2.0;
            ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, ch); ctx.stroke();

            const text = `${rpm.toLocaleString()} RPM`;
            ctx.font = 'bold 14px sans-serif';
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(pos + 5, 5, 80, 20);
            ctx.fillStyle = '#ff3b30';
            ctx.fillText(text, pos + 8, 20);
        }
    }
</script>
</body>
</html>
