<script>
/* ============================================================
   初期化
============================================================ */
let audioCtx = null;
let analyser = null;
let dataArray = null;
let running = false;
let stream = null;

const FFT_SIZE = 8192;

const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

/* ---- UI Elements ---- */
const minSlider = document.getElementById("minRpm");
const maxSlider = document.getElementById("maxRpm");
const minLabel  = document.getElementById("minRpmLabel");
const maxLabel  = document.getElementById("maxRpmLabel");

const rpmValue  = document.getElementById("rpmValue");
const rpmMax    = document.getElementById("rpmMax");
const rpmMin    = document.getElementById("rpmMin");

const speedValue = document.getElementById("speedValue");
const speedMax   = document.getElementById("speedMax");
const speedMin   = document.getElementById("speedMin");

const statusLine = document.getElementById("statusLine");

let lastRpm = null;
let lastPeakBin = null;
let autoRangeLocked = false;

/* ---- Calibration ---- */
let calFactor = 1.0;
(function loadCalFactor() {
  const saved = localStorage.getItem("mini4wd_cal_factor_8192");
  if (saved !== null) {
    const v = parseFloat(saved);
    if (!isNaN(v) && v > 0 && v < 2) {
      calFactor = v;
    }
  }
})();

/* ============================================================
   UI 更新
============================================================ */
function updateLabels() {
  minLabel.textContent = minSlider.value;
  maxLabel.textContent = maxSlider.value;
}

/* ---- スライダー操作 ---- */
minSlider.addEventListener("input", () => {
  if (parseInt(minSlider.value) > parseInt(maxSlider.value)) {
    minSlider.value = maxSlider.value;
  }
  autoRangeLocked = true;
  updateLabels();
});

maxSlider.addEventListener("input", () => {
  if (parseInt(maxSlider.value) < parseInt(minSlider.value)) {
    maxSlider.value = minSlider.value;
  }
  autoRangeLocked = true;
  updateLabels();
});

updateLabels();

/* ============================================================
   スムージング
============================================================ */
function getSmoothAlpha(rpm) {
  if (rpm < 20000) return 0.30;
  if (rpm < 30000) return 0.25;
  if (rpm < 40000) return 0.20;
  return 0.18;
}

/* ============================================================
   Auto Range
============================================================ */
function autoAdjustRange(rpm) {
  if (autoRangeLocked) return;

  const span = 5000;
  const min = Math.max(5000, rpm - span);
  const max = Math.min(60000, rpm + span);

  minSlider.value = Math.round(min);
  maxSlider.value = Math.round(max);

  updateLabels();
}


/* ============================================================
   ★★★ ピーク検出強化版 getPrecisePeakHz ★★★
   - lastPeakBin 周囲 ±10bin の優先探索
   - 山の形チェック（左右差・尖りノイズ除外）
   - 振幅急変ノイズ除外
   - 3点補間の安定化
============================================================ */
function getPrecisePeakHz(data, fftSize, sampleRate) {
  const minRpm = parseInt(minSlider.value, 10);
  const maxRpm = parseInt(maxSlider.value, 10);

  const minFreq = minRpm / 60;
  const maxFreq = maxRpm / 60;

  const binToHz = sampleRate / fftSize;
  const minBin = Math.floor(minFreq / binToHz);
  const maxBin = Math.floor(maxFreq / binToHz);

  const len = data.length;
  const from = Math.max(2, Math.min(minBin, len - 3));
  const to   = Math.max(3, Math.min(maxBin, len - 2));

  let bestIdx = -1;
  let bestVal = -Infinity;

  /* ---- 1) 前回ピークの周囲 ±10bin を優先探索 ---- */
  if (lastPeakBin !== null) {
    const center = Math.floor(lastPeakBin);
    const radius = 10;
    const sFrom = Math.max(from, center - radius);
    const sTo   = Math.min(to,   center + radius);

    for (let i = sFrom; i <= sTo; i++) {
      const v = data[i];
      if (v > bestVal) {
        bestVal = v;
        bestIdx = i;
      }
    }
  }

  /* ---- 2) 全域探索（バックアップ） ---- */
  if (bestIdx === -1) {
    for (let i = from; i <= to; i++) {
      const v = data[i];
      if (v > bestVal) {
        bestVal = v;
        bestIdx = i;
      }
    }
  }

  if (bestIdx <= from || bestIdx >= to) return 0;

  /* ---- 3) 山の形チェック（ノイズ除外） ---- */
  const L = data[bestIdx - 1];
  const C = data[bestIdx];
  const R = data[bestIdx + 1];

  // 左右が極端に低い → 尖りノイズ
  if (C - Math.max(L, R) < 3) return 0;

  // 左右の傾きが不自然 → ノイズ
  if (Math.abs(L - R) > 40) return 0;

  /* ---- 4) 3点補間（安定化） ---- */
  const denom = (L - 2 * C + R);
  const offset = denom === 0 ? 0 : (L - R) / (2 * denom);
  const peakBin = bestIdx + offset;

  lastPeakBin = peakBin;

  return peakBin * binToHz;
}

/* ============================================================
   FFT描画
============================================================ */
function drawFFT() {
  const w = canvas.width;
  const h = canvas.height;

  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.strokeStyle = "#4a6cff";
  ctx.lineWidth = 1.4;

  const step = dataArray.length / w;
  const scale = h / 256;

  for (let x = 0; x < w; x++) {
    const bin = Math.floor(x * step);
    const v = dataArray[bin];
    const y = h - v * scale;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

/* ============================================================
   メインループ
============================================================ */
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  drawFFT();

  /* ---- ピーク検出（強化版） ---- */
  const peakHz = getPrecisePeakHz(dataArray, analyser.fftSize, audioCtx.sampleRate);
  if (peakHz > 0) {
    const rawRpm = peakHz * 60;
    const calibratedRpm = rawRpm * calFactor;

    /* ---- スムージング ---- */
    const alpha = getSmoothAlpha(calibratedRpm);
    let displayRpm = calibratedRpm;
    if (lastRpm !== null) {
      displayRpm = lastRpm * (1 - alpha) + calibratedRpm * alpha;
    }
    lastRpm = displayRpm;

    /* ---- Auto Range ---- */
    autoAdjustRange(displayRpm);

    /* ---- RPM 表示 ---- */
    rpmValue.textContent = Math.round(displayRpm);

    /* ---- RPM MAX / MIN ---- */
    const rpmNum = Math.round(displayRpm);
    const prevMax = parseInt(rpmMax.textContent) || 0;
    const prevMin = parseInt(rpmMin.textContent) || 999999;

    if (rpmNum > prevMax) rpmMax.textContent = rpmNum;
    if (rpmNum < prevMin) rpmMin.textContent = rpmNum;

    /* ---- SPEED 計算 ---- */
    const tireDiameter = 26.0;  // mm（一般的なミニ四駆）
    const gearRatio = 3.5;      // 仮の値（必要なら調整可能）

    const tireCirc = (tireDiameter / 1000) * Math.PI; // m
    const speed = (displayRpm / gearRatio) * tireCirc * 60 / 1000; // km/h

    speedValue.textContent = speed.toFixed(2);

    /* ---- SPEED MAX / MIN ---- */
    const prevSMax = parseFloat(speedMax.textContent) || 0;
    const prevSMin = parseFloat(speedMin.textContent) || 9999;

    if (speed > prevSMax) speedMax.textContent = speed.toFixed(2);
    if (speed < prevSMin) speedMin.textContent = speed.toFixed(2);
  }
}


/* ============================================================
   Audio Start / Stop
============================================================ */
async function startAudio() {
  if (running) return;
  running = true;

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;

  const binCount = analyser.frequencyBinCount;
  dataArray = new Uint8Array(binCount);

  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  lastRpm = null;
  lastPeakBin = null;
  autoRangeLocked = false;

  statusLine.textContent = "計測中…";

  loop();
}

function stopAudio() {
  running = false;
  if (audioCtx) audioCtx.suspend();
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  statusLine.textContent = "停止中";
  rpmValue.textContent = "--";
  speedValue.textContent = "--";
}

/* ============================================================
   リセット
============================================================ */
document.getElementById("resetButton").addEventListener("click", () => {
  rpmMax.textContent = "--";
  rpmMin.textContent = "--";
  speedMax.textContent = "--";
  speedMin.textContent = "--";
});

/* ============================================================
   ボタンイベント
============================================================ */
document.getElementById("startButton").addEventListener("click", () => {
  if (!audioCtx || audioCtx.state === "suspended") {
    startAudio();
  } else {
    audioCtx.resume();
    running = true;
    statusLine.textContent = "計測中…";
    loop();
  }
});

document.getElementById("stopButton").addEventListener("click", stopAudio);

</script>
